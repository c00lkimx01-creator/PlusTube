<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ video_title }} - Shorts</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --aqua-300:#6fd6f5;--aqua-400:#36c4ec;--aqua-500:#10aede;--aqua-600:#0a8fbb;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#000;color:#fff;height:100%;
  font-family:'M PLUS Rounded 1c',system-ui,sans-serif;
  overflow:hidden;overscroll-behavior:none;}

/* 縦スクロール用フィード */
.feed{
  position:fixed;inset:0;
  overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.feed::-webkit-scrollbar{display:none}
.feed{scrollbar-width:none}
.slide{
  position:relative;width:100%;height:100dvh;
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}
.slide video{
  width:100%;height:100%;object-fit:contain;background:#000;
}
.slide.placeholder{display:flex;align-items:center;justify-content:center}
.spinner{
  width:42px;height:42px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--aqua-400);border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* オーバーレイ情報 */
.overlay{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg, rgba(0,0,0,.45) 0%, transparent 22%, transparent 60%, rgba(0,0,0,.7) 100%);
}
.meta{
  position:absolute;left:14px;right:90px;bottom:24px;pointer-events:auto;
}
.meta .title{font-weight:800;font-size:16px;line-height:1.35;margin:0 0 8px;
  text-shadow:0 2px 8px rgba(0,0,0,.6)}
.meta .author{color:#cdeeff;font-weight:700;font-size:13px;opacity:.95}

/* 右サイドのアクション */
.side{
  position:absolute;right:10px;bottom:30px;display:flex;flex-direction:column;
  gap:18px;align-items:center;pointer-events:auto;
}
.side button{
  background:rgba(255,255,255,.10);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.18);color:#fff;
  width:48px;height:48px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:.2s;
}
.side button:hover{background:rgba(16,174,222,.4);border-color:var(--aqua-300)}
.side .label{font-size:11px;color:#cdeeff;margin-top:-10px}

/* トップバー */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;gap:10px;padding:14px 14px;
  background:linear-gradient(180deg, rgba(0,0,0,.55), transparent);
}
.topbar a, .topbar button{
  background:rgba(255,255,255,.12);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);color:#fff;
  padding:8px 14px;border-radius:999px;text-decoration:none;font-weight:700;
  font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;
}
.topbar .brand{
  font-weight:800;color:#fff;background:linear-gradient(135deg,var(--aqua-400),var(--aqua-600));
  border:0;padding:8px 14px;border-radius:999px;
  box-shadow:0 6px 18px rgba(16,174,222,.5);
}
.topbar .spacer{flex:1}

/* 再生方法スイッチ */
.method{
  position:fixed;top:64px;right:14px;z-index:25;
  display:flex;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  border-radius:999px;padding:4px;border:1px solid rgba(255,255,255,.15);
}
.method button{
  background:transparent;border:0;color:#cdeeff;font-weight:700;
  padding:6px 12px;border-radius:999px;cursor:pointer;font-size:11.5px;
  font-family:inherit;transition:.2s;
}
.method button.on{background:linear-gradient(135deg,var(--aqua-400),var(--aqua-600));color:#fff}

/* タップ時のハートアニメ */
.heart-pop{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  color:#ff5b8a;font-size:90px;opacity:0;pointer-events:none;
  filter:drop-shadow(0 4px 18px rgba(255,91,138,.7));
}
.heart-pop.go{animation:heart .8s ease forwards}
@keyframes heart{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}
}

/* 一時停止アイコン */
.pause-icon{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  font-size:64px;color:rgba(255,255,255,.85);
  opacity:0;transition:opacity .2s;pointer-events:none;
  text-shadow:0 4px 18px rgba(0,0,0,.6);
}
.pause-icon.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="brand">PlusTube</a>
  <div class="spacer"></div>
  <a href="/search?q=shorts&type=short"><i class="fas fa-search"></i></a>
  <a href="/watch?v={{ videoid }}" title="通常表示"><i class="fas fa-display"></i></a>
</div>

<div class="method" id="methodSwitch">
  <button data-m="stream" class="on">Stream</button>
  <button data-m="edu">Edu</button>
  <button data-m="nocookie">NoCookie</button>
</div>

<div class="feed" id="feed">
  <!-- 最初のスライドはサーバー側データから -->
  <section class="slide" data-id="{{ videoid }}" data-title="{{ video_title|e }}" data-author="{{ author|e }}">
    <video src="{{ videourls[0] }}" loop playsinline preload="auto" autoplay></video>
    <div class="overlay"></div>
    <div class="pause-icon"><i class="fas fa-play"></i></div>
    <div class="heart-pop"><i class="fas fa-heart"></i></div>
    <div class="meta">
      <p class="title">{{ video_title }}</p>
      <p class="author">@{{ author }}</p>
    </div>
    <div class="side">
      <button onclick="likeTap(this)" title="いいね"><i class="fas fa-heart"></i></button>
      <button onclick="shareTap('{{ videoid }}')" title="共有"><i class="fas fa-share"></i></button>
      <button onclick="location.href='/watch?v={{ videoid }}'" title="詳細"><i class="fas fa-circle-info"></i></button>
    </div>
  </section>
</div>

<script>
const feed = document.getElementById('feed');
let method = 'stream';
let loadingNext = false;
const seen = new Set(['{{ videoid }}']);

// 再生方法スイッチ
document.getElementById('methodSwitch').addEventListener('click', e=>{
  const b = e.target.closest('button');
  if(!b) return;
  method = b.dataset.m;
  [...e.currentTarget.querySelectorAll('button')].forEach(x=>x.classList.toggle('on', x===b));
  // 現在のスライドをリビルド
  const cur = currentSlide();
  if(cur) rebuildSlide(cur);
});

function currentSlide(){
  const slides = feed.querySelectorAll('.slide');
  for(const s of slides){
    const r = s.getBoundingClientRect();
    if(r.top >= -10 && r.top < window.innerHeight*0.5) return s;
  }
  return slides[0];
}

function rebuildSlide(slide){
  const id = slide.dataset.id;
  const old = slide.querySelector('video, iframe');
  if(!old) return;
  if(method === 'stream'){
    if(old.tagName === 'IFRAME'){
      // streamに戻す場合、簡易にリロード
      location.href = '/shorts/' + id;
    }else{
      old.play().catch(()=>{});
    }
  }else{
    const domain = method === 'nocookie' ? 'www.youtube-nocookie.com' : 'www.youtubeeducation.com';
    const iframe = document.createElement('iframe');
    iframe.src = `https://${domain}/embed/${id}?autoplay=1&loop=1&playlist=${id}&playsinline=1`;
    iframe.style.cssText = 'width:100%;height:100%;border:0;background:#000';
    iframe.allow = 'autoplay; encrypted-media';
    iframe.allowFullscreen = true;
    old.replaceWith(iframe);
  }
}

// タップで再生/一時停止
feed.addEventListener('click', e=>{
  const s = e.target.closest('.slide');
  if(!s) return;
  const v = s.querySelector('video');
  if(!v) return;
  const ic = s.querySelector('.pause-icon');
  if(v.paused){ v.play(); ic.classList.remove('show'); }
  else { v.pause(); ic.classList.add('show'); }
});

function likeTap(btn){
  const s = btn.closest('.slide');
  const heart = s.querySelector('.heart-pop');
  heart.classList.remove('go'); void heart.offsetWidth; heart.classList.add('go');
  btn.style.color = '#ff5b8a';
}
function shareTap(id){
  const url = location.origin + '/shorts/' + id;
  if(navigator.share){ navigator.share({url}).catch(()=>{}); }
  else { navigator.clipboard.writeText(url); alert('URLをコピーしました'); }
}

// 次のショートをロード
async function appendNext(){
  if(loadingNext) return;
  loadingNext = true;
  try{
    const r = await fetch('/api/shorts_feed');
    const list = await r.json();
    for(const item of list){
      if(!item.videoId || seen.has(item.videoId)) continue;
      seen.add(item.videoId);
      const slide = await buildSlide(item.videoId, item.title, item.author);
      if(slide) feed.appendChild(slide);
      if(feed.children.length > 12) feed.firstElementChild?.remove();
    }
  }catch(e){}
  loadingNext = false;
}

async function buildSlide(id, title, author){
  // 動画URLを取得（再利用してインライン再生）
  try{
    const resp = await fetch(`/api/short_src?v=${id}`);
    if(!resp.ok) return null;
    const data = await resp.json();
    const src = data.url;
    const wrap = document.createElement('section');
    wrap.className = 'slide';
    wrap.dataset.id = id;
    const safeT = (title||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
    const safeA = (author||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
    let media;
    if(method === 'stream' && src){
      media = `<video src="${src}" loop playsinline preload="metadata"></video>`;
    }else{
      const domain = method === 'nocookie' ? 'www.youtube-nocookie.com' : (method==='edu' ? 'www.youtubeeducation.com' : null);
      if(domain){
        media = `<iframe src="https://${domain}/embed/${id}?autoplay=1&loop=1&playlist=${id}&playsinline=1" style="width:100%;height:100%;border:0;background:#000" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      }else{
        media = `<video src="${src}" loop playsinline preload="metadata"></video>`;
      }
    }
    wrap.innerHTML = `
      ${media}
      <div class="overlay"></div>
      <div class="pause-icon"><i class="fas fa-play"></i></div>
      <div class="heart-pop"><i class="fas fa-heart"></i></div>
      <div class="meta"><p class="title">${safeT}</p><p class="author">@${safeA}</p></div>
      <div class="side">
        <button onclick="likeTap(this)" title="いいね"><i class="fas fa-heart"></i></button>
        <button onclick="shareTap('${id}')" title="共有"><i class="fas fa-share"></i></button>
        <button onclick="location.href='/watch?v=${id}'" title="詳細"><i class="fas fa-circle-info"></i></button>
      </div>`;
    return wrap;
  }catch(e){ return null; }
}

// スクロールで現在のスライドだけ再生
const io = new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    const v = en.target.querySelector('video');
    if(!v) return;
    if(en.intersectionRatio > 0.6){ v.play().catch(()=>{}); }
    else { v.pause(); }
  });
  // 末尾近づいたら追加ロード
  const slides = feed.querySelectorAll('.slide');
  const last = slides[slides.length-1];
  if(last && last.getBoundingClientRect().top < window.innerHeight*1.5){
    appendNext();
  }
}, {threshold:[0,0.6,1]});

function observeAll(){
  feed.querySelectorAll('.slide').forEach(s=>io.observe(s));
}
observeAll();

// 初期に1ページ先読み
appendNext().then(observeAll);

// 監視を継続
const mo = new MutationObserver(()=>observeAll());
mo.observe(feed, {childList:true});
</script>
</body>
</html>
